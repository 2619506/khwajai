<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Khwaja AI | Intelligent Analytics</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700;900&family=Outfit:wght@300;400;600&display=swap');

  :root{
    --neon-blue: #00f3ff;
    --neon-purple: #bc13fe;
    --neon-green: #0aff68;
    --deep-space: #020617;
    --glass: rgba(255, 255, 255, 0.05);
  }

  * { box-sizing:border-box; margin: 0; padding: 0; }
  html, body { height:100%; margin: 0; overflow: hidden; background: var(--deep-space); color: #fff; font-family: 'Outfit', sans-serif; }

  /* --- BACKGROUND & STARS --- */
  canvas#stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* --- MAIN NAVIGATION WHEEL --- */
  .wheel { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: min(60vw, 500px); height: min(60vw, 500px); z-index: 10; transition: opacity 0.5s ease; }
  
  /* Planet Styles */
  .earth-surface {
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #4ade80 0%, #059669 25%, #0369a1 50%, #0f172a 85%, #020617 100%);
    box-shadow: inset 10px 10px 60px rgba(255,255,255,0.15), inset -20px -20px 80px rgba(0,0,0,0.95), 0 0 40px rgba(14, 165, 233, 0.15);
    cursor: pointer; position: relative;
  }

  .moon-surface {
    position: absolute; width: 90px; height: 90px; border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #e2e8f0 0%, #94a3b8 30%, #64748b 60%, #1e293b 90%, #020617 100%);
    box-shadow: inset 2px 2px 10px rgba(255,255,255,0.3), 0 0 15px rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.3s ease;
    display: flex; justify-content: center; align-items: center; text-align: center;
    font-family: 'Orbitron', sans-serif; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #0f172a; z-index: 20;
  }
  .moon-surface:hover { transform: scale(1.15); box-shadow: 0 0 25px var(--neon-blue); color: var(--neon-blue); text-shadow: 0 0 5px #000; border-color: var(--neon-blue); }

  /* Positions */
  .pos-left { top: 50%; left: -110px; transform: translateY(-50%); }
  .pos-right { top: 50%; right: -110px; transform: translateY(-50%); }
  .pos-bottom { bottom: -110px; left: 50%; transform: translateX(-50%); }

  .portfolio-orbit { 
    position: fixed; top: 8%; right: 8%; width: 100px; height: 100px; z-index: 100; 
    border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff7ed 0%, #fcd34d 20%, #f59e0b 50%, #ea580c 85%, #7c2d12 100%);
    box-shadow: 0 0 40px rgba(245, 158, 11, 0.4); display: grid; place-items: center;
    font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 0.7rem; color: #451a03; cursor: pointer;
    animation: pulseSun 4s infinite; transition: transform 0.3s;
  }
  .portfolio-orbit:hover { transform: scale(1.1); box-shadow: 0 0 60px rgba(245, 158, 11, 0.8); }
  @keyframes pulseSun { 0%,100%{ box-shadow: 0 0 40px rgba(245, 158, 11, 0.4); } 50%{ box-shadow: 0 0 70px rgba(245, 158, 11, 0.6); } }

  /* --- CENTER TEXT --- */
  .center-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 80%; text-align: center; pointer-events: none; z-index: 30; }
  #ccTitle { font-family: 'Orbitron', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 20px rgba(0,0,0,0.8); margin-bottom: 10px;}
  #ccText { font-size: clamp(0.8rem, 1.5vh, 1rem); line-height: 1.6; max-width: 500px; margin: 0 auto; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
  #ccText b { color: var(--neon-green); display: block; margin-bottom: 5px; font-family: 'Share Tech Mono', monospace; letter-spacing: 1px; }

  /* --- SATELLITE HANGAR (NEW TOOL SHELF) --- */
  .hangar-overlay {
    position: fixed; inset: 0; z-index: 500; background: rgba(2, 6, 23, 0.95);
    backdrop-filter: blur(10px); display: none; opacity: 0; transition: opacity 0.5s ease;
    flex-direction: column; justify-content: center; align-items: center;
  }
  
  .hangar-grid {
    position: absolute; inset: 0; 
    background-image: 
      linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    perspective: 1000px; transform: scale(1.2); opacity: 0.2; pointer-events: none;
  }

  .hangar-title {
    font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--neon-blue);
    text-shadow: 0 0 15px var(--neon-blue); margin-bottom: 60px; z-index: 10; letter-spacing: 3px;
  }

  .satellite-belt {
    display: flex; gap: 60px; z-index: 10; perspective: 1000px; flex-wrap: wrap; justify-content: center;
  }

  /* --- SATELLITE OBJECT DESIGN --- */
  .satellite-unit {
    position: relative; width: 140px; height: 140px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  /* Hover Animation */
  .satellite-unit:hover { transform: translateY(-15px) scale(1.1); }
  .satellite-unit:hover .sat-body { box-shadow: 0 0 30px var(--glow-color); border-color: #fff; }
  .satellite-unit:hover .sat-wing { background: rgba(255,255,255,0.9); box-shadow: 0 0 20px var(--glow-color); }
  .satellite-unit:hover .sat-label { color: #fff; text-shadow: 0 0 10px #fff; opacity: 1; transform: translateY(10px); }

  /* The Core Body */
  .sat-body {
    width: 60px; height: 60px; background: #0f172a; border: 2px solid var(--neon-color);
    border-radius: 12px; display: grid; place-items: center; z-index: 2;
    box-shadow: 0 0 15px var(--glow-color), inset 0 0 10px var(--glow-color);
    transition: all 0.3s ease; position: relative;
  }
  .sat-body i { font-size: 1.5rem; color: #fff; }

  /* The Solar Wings */
  .sat-wing {
    position: absolute; top: 50%; transform: translateY(-50%);
    width: 35px; height: 50px; background: rgba(255,255,255,0.1);
    border: 1px solid var(--neon-color); z-index: 1;
    transition: all 0.3s ease;
  }
  .sat-wing.left { left: -20px; border-radius: 4px 0 0 4px; border-right: none; }
  .sat-wing.right { right: -20px; border-radius: 0 4px 4px 0; border-left: none; }
  
  /* Grid lines on wings */
  .sat-wing::after {
    content:''; position: absolute; inset: 0;
    background: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 100% 25%;
  }

  /* Label */
  .sat-label {
    margin-top: 25px; font-family: 'Share Tech Mono', monospace; font-size: 0.9rem;
    color: var(--neon-color); letter-spacing: 1px; opacity: 0.7;
    transition: all 0.3s ease; text-align: center;
  }

  /* --- APP CONTAINERS --- */
  .app-frame {
    display: none; position: fixed; inset: 0; z-index: 2000; background: #000;
    animation: zoomIn 0.5s ease-out;
  }
  @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .close-hangar {
    position: absolute; top: 30px; right: 30px; 
    background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue);
    padding: 10px 20px; font-family: 'Orbitron', sans-serif; cursor: pointer;
    text-transform: uppercase; font-size: 0.8rem; z-index: 20;
    transition: 0.3s;
  }
  .close-hangar:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

  /* --- RESPONSIVE --- */
  @media (max-width: 980px){ 
    .wheel { width: 85vw; height: 85vw; } 
    .pos-left { left: -40px; } .pos-right { right: -40px; } .pos-bottom { bottom: -40px; }
    .satellite-belt { gap: 40px; }
    #ccTitle { font-size: 2rem; }
  }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="wheel earth-surface" id="wheel" onclick="showHome()">
  
  <div class="moon-surface pos-left" onclick="event.stopPropagation(); openHangar()">
    <div><i class="fas fa-rocket" style="display:block; font-size:1.2rem; margin-bottom:4px;"></i>Tools</div>
  </div>
  
  <div class="moon-surface pos-right" onclick="event.stopPropagation(); showProjects()">
    <div><i class="fas fa-folder-open" style="display:block; font-size:1.2rem; margin-bottom:4px;"></i>Work</div>
  </div>
  
  <div class="moon-surface pos-bottom" onclick="event.stopPropagation(); window.open('https://github.com/khwaja-gh', '_blank')">
    <div><i class="fab fa-github" style="display:block; font-size:1.2rem; margin-bottom:4px;"></i>Code</div>
  </div>
  
  <div class="center-content" id="centerContent">
    <h1 id="ccTitle">KHWAJA AI</h1>
    <div id="ccText">
      <b>Intelligent Analytics System</b>
      <p>Merging financial modeling with advanced AI. Click the satellites to explore tools, projects, and codebase.</p>
    </div>
  </div>
</div>

<div class="portfolio-orbit" onclick="window.open('/portfolio/', '_blank')">PORTFOLIO</div>

<div id="hangarOverlay" class="hangar-overlay">
  <div class="hangar-grid"></div>
  <button class="close-hangar" onclick="closeHangar()"> <i class="fas fa-arrow-left"></i> Return to Orbit</button>
  
  <h2 class="hangar-title">SELECT TOOL MODULE</h2>
  
  <div class="satellite-belt">
    
    <div class="satellite-unit" style="--neon-color: #0aff68; --glow-color: rgba(10, 255, 104, 0.4);" onclick="openApp('spreadsheet')">
      <div class="sat-wing left"></div>
      <div class="sat-body"><i class="fas fa-table"></i></div>
      <div class="sat-wing right"></div>
      <div class="sat-label">AI SPREADSHEET</div>
    </div>

    <div class="satellite-unit" style="--neon-color: #bc13fe; --glow-color: rgba(188, 19, 254, 0.4);" onclick="openApp('nutrition')">
      <div class="sat-wing left"></div>
      <div class="sat-body"><i class="fas fa-carrot"></i></div>
      <div class="sat-wing right"></div>
      <div class="sat-label">NUTRITION AI</div>
    </div>

    <div class="satellite-unit" style="--neon-color: #00f3ff; --glow-color: rgba(0, 243, 255, 0.4); opacity: 0.5; pointer-events:none;">
      <div class="sat-wing left"></div>
      <div class="sat-body"><i class="fas fa-lock"></i></div>
      <div class="sat-wing right"></div>
      <div class="sat-label">LOCKED</div>
    </div>

  </div>
</div>

<div id="appContainer_spreadsheet" class="app-frame">
  <button class="close-hangar" onclick="closeApp('spreadsheet')" style="background:rgba(0,0,0,0.8);">✕ Close Tool</button>
  <iframe src="https://khwajai-spreadsheet.hf.space/?embed=true" style="width:100%; height:100%; border:none;"></iframe>
</div>

<div id="appContainer_nutrition" class="app-frame">
  <button class="close-hangar" onclick="closeApp('nutrition')" style="background:rgba(0,0,0,0.8);">✕ Close Tool</button>
  <iframe src="https://khwajai-nutrition-planner.hf.space" style="width:100%; height:100%; border:none;"></iframe>
</div>

<script>
/* --- HANGAR LOGIC --- */

function openHangar() {
  const hangar = document.getElementById('hangarOverlay');
  hangar.style.display = 'flex';
  // Small delay to allow CSS transition to catch the display change
  setTimeout(() => { hangar.style.opacity = '1'; }, 10);
  
  // Hide the main wheel for cleaner look
  document.getElementById('wheel').style.opacity = '0';
  document.getElementById('wheel').style.pointerEvents = 'none';
}

function closeHangar() {
  const hangar = document.getElementById('hangarOverlay');
  hangar.style.opacity = '0';
  setTimeout(() => { hangar.style.display = 'none'; }, 500);
  
  // Show wheel again
  document.getElementById('wheel').style.opacity = '1';
  document.getElementById('wheel').style.pointerEvents = 'all';
}

function openApp(appName) {
  document.getElementById('hangarOverlay').style.opacity = '0'; // Fade out hangar
  setTimeout(() => { document.getElementById('hangarOverlay').style.display = 'none'; }, 500);
  
  document.getElementById(`appContainer_${appName}`).style.display = 'block';
}

function closeApp(appName) {
  document.getElementById(`appContainer_${appName}`).style.display = 'none';
  openHangar(); // Go back to hangar instead of home
}

/* --- TEXT UPDATES --- */
function showProjects(){
  document.getElementById('ccTitle').innerHTML = "MISSION LOG";
  document.getElementById('ccText').innerHTML = `
    <ul style="text-align:left; list-style:none; padding:0; font-size:0.9rem;">
      <li style="margin-bottom:12px; border-left:2px solid var(--neon-green); padding-left:10px;">
        <b style="color:var(--neon-green)">iOutlet Revenue</b>
        Analyzed £8.9M in transactions to optimize seasonal stock.
      </li>
      <li style="margin-bottom:12px; border-left:2px solid var(--neon-blue); padding-left:10px;">
        <b style="color:var(--neon-blue)">Financial Forecasting</b>
        MATLAB/R models for equity trend prediction.
      </li>
    </ul>
    <div style="margin-top:10px; font-size:0.7rem; color:#64748b;">// CLICK EARTH TO RESET</div>
  `;
}

function showHome(){
  document.getElementById('ccTitle').innerHTML = "KHWAJA AI";
  document.getElementById('ccText').innerHTML = `<b>Intelligent Analytics System</b><p>Merging financial modeling with advanced AI. Click the satellites to explore tools, projects, and codebase.</p>`;
}

/* --- STARFIELD ANIMATION --- */
const canvas = document.getElementById('stars'); const ctx = canvas.getContext('2d'); 
let stars = [];
function resizeCanvas(){ canvas.width = innerWidth; canvas.height = innerHeight; } 
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

function initStars() {
  stars = [];
  for(let i=0; i<400; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5,
      speed: Math.random() * 0.2
    });
  }
}

function animateStars() {
  ctx.fillStyle = "#020617";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#fff";
  
  stars.forEach(s => {
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
    s.y -= s.speed; // Move up like space travel
    if(s.y < 0) s.y = canvas.height;
  });
  requestAnimationFrame(animateStars);
}
initStars(); animateStars();

/* --- PARALLAX EFFECT --- */
document.addEventListener('mousemove', (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 20;
  const y = (e.clientY / window.innerHeight - 0.5) * 20;
  document.getElementById('wheel').style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
});

</script>
</body>
</html>
